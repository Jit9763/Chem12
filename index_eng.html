<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Class 12 NCERT Chemistry - Premium Projector Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    
    <!-- Animated Subtle Background -->
    <div class="bg-animation"></div>

    <header class="hero" style="position: relative;">
        <!-- LANGUAGE TOGGLE -->
        <div style="position: absolute; top: 20px; right: 30px; display: flex; gap: 10px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 30px; z-index: 100;">
            <button onclick="window.location.href='index.html'" style="background: transparent; color: rgba(255,255,255,0.7); border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s;" onmouseover="this.style.color='white'" onmouseout="this.style.color='rgba(255,255,255,0.7)'">🇮🇳 Hindi</button>
            <button onclick="window.location.href='index_eng.html'" style="background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4);">🇬🇧 English</button>
        </div>

        <div class="badge">Premium Projector Edition (Class 12)</div>
        <h1>NCERT <span class="gradient-text">Chemistry</span></h1>
        <p>Detailed and high-quality interactive notes prepared for the entire syllabus.</p>
        <p style="font-size: 1.1rem; color: #a7f3d0; margin-top: 15px; font-weight: 600; letter-spacing: 0.5px; background: rgba(0,0,0,0.2); padding: 8px 20px; border-radius: 20px; display: inline-block;">
            ✨ Special Thanks: Jyotsana Ma'am (Lecturer Chemistry)
        </p>
    </header>

    <main class="container">
        <div class="filter-section">
            <input type="text" id="searchBar" placeholder="Search chapters (e.g. Solutions, Electrochemistry)...">
        </div>

        <div id="chapter-grid" class="chapter-grid">
            <!-- Generated via JS: main.js -->
        </div>
    </main>

    <footer>
        <p>© 2026 Chemistry इंटरैक्टिव पोर्टल | Designed for Excellence</p>
    </footer>

    <script src="js/main_eng.js"></script>
</body>
</html>
