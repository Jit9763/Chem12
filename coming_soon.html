<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon — Class 12 Chemistry Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(5, 150, 105, 0.15), transparent 60%),
                        radial-gradient(circle at 70% 60%, rgba(59, 130, 246, 0.1), transparent 50%);
            z-index: 0;
        }
        .floating-orb {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.3;
            animation: float 8s ease-in-out infinite alternate;
        }
        .orb-1 { width: 300px; height: 300px; background: #059669; top: 10%; left: 10%; }
        .orb-2 { width: 250px; height: 250px; background: #3b82f6; bottom: 10%; right: 10%; animation-delay: 2s; }
        .orb-3 { width: 200px; height: 200px; background: #8b5cf6; top: 50%; left: 50%; animation-delay: 4s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -20px) scale(1.1); }
        }

        .container {
            position: relative; z-index: 10;
            text-align: center; padding: 40px;
            max-width: 700px;
        }

        .icon {
            font-size: 6rem;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 {
            font-size: 3.5rem; font-weight: 900;
            background: linear-gradient(135deg, #059669, #34d399, #3b82f6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .subtitle {
            font-size: 1.5rem; color: #94a3b8; font-weight: 600;
            margin-bottom: 40px; line-height: 1.6;
        }

        .progress-bar-container {
            width: 100%; height: 12px;
            background: #1e293b; border-radius: 20px;
            overflow: hidden; margin-bottom: 15px;
            border: 1px solid #334155;
        }
        .progress-fill {
            height: 100%; width: 10%;
            background: linear-gradient(90deg, #059669, #34d399);
            border-radius: 20px;
            animation: loading 3s ease-in-out infinite;
        }
        @keyframes loading {
            0% { width: 10%; } 50% { width: 60%; } 100% { width: 10%; }
        }

        .progress-text {
            color: #64748b; font-size: 1rem; font-weight: 700;
            margin-bottom: 40px;
        }

        .features {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            margin-bottom: 40px;
        }
        .feature-chip {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 15px; border-radius: 15px;
            font-size: 1rem; color: #cbd5e1; font-weight: 600;
        }
        .feature-chip span { font-size: 1.5rem; display: block; margin-bottom: 5px; }

        .btn-home {
            display: inline-block; padding: 18px 50px;
            background: linear-gradient(135deg, #059669, #047857);
            color: white; border: none; border-radius: 50px;
            font-size: 1.3rem; font-weight: 800;
            text-decoration: none; cursor: pointer;
            box-shadow: 0 10px 30px rgba(5, 150, 105, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(5, 150, 105, 0.4);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .subtitle { font-size: 1.2rem; }
            .features { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="floating-orb orb-1"></div>
    <div class="floating-orb orb-2"></div>
    <div class="floating-orb orb-3"></div>

    <div class="container">
        <div class="icon">🚀</div>
        <h1>Coming Soon</h1>
        <p class="subtitle">
            यह अध्याय जल्द ही उपलब्ध होगा!<br>
            This chapter is under development.
        </p>

        <div class="progress-bar-container">
            <div class="progress-fill"></div>
        </div>
        <p class="progress-text">Building Premium Content...</p>

        <div class="features">
            <div class="feature-chip"><span>📝</span> Detailed Notes</div>
            <div class="feature-chip"><span>🔬</span> Interactive Simulators</div>
            <div class="feature-chip"><span>🇮🇳</span> Hindi + English</div>
            <div class="feature-chip"><span>📊</span> Dynamic Graphs</div>
        </div>

        <a href="index.html" class="btn-home">🏠 वापस जाएं (Go Back)</a>
    </div>
</body>
</html>
